<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>File Bot — Admin</title>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <!-- ═══════════════════════════ LOGIN ════════════════════════════════════════ -->
        <div id="login" class="full-overlay">
            <div class="login-card">
                <div class="login-icon">🤖</div>
                <h1>File Bot Admin</h1>
                <p class="muted">Enter your admin secret to continue</p>
                <input
                    id="secret-input"
                    type="password"
                    class="input"
                    placeholder="Admin secret…"
                />
                <div id="login-error" class="login-error hidden"></div>
                <button onclick="login()" class="btn btn-primary btn-full">
                    Sign In
                </button>
            </div>
        </div>

        <!-- ═══════════════════════════ APP ══════════════════════════════════════════ -->
        <div id="app" class="hidden">
            <header>
                <div class="header-left">
                    <span class="header-icon">🤖</span>
                    <span class="header-title">File Bot Admin</span>
                </div>
                <div class="header-right">
                    <span id="bot-status" class="status-dot muted"
                        >Connecting…</span
                    >
                    <button onclick="logout()" class="btn btn-ghost btn-sm">
                        Sign Out
                    </button>
                </div>
            </header>

            <main>
                <!-- Stats ---------------------------------------------------------------- -->
                <div class="stats-bar">
                    <div class="stat-card">
                        <span id="stat-total" class="stat-val">—</span>
                        <span class="stat-lbl">Resources</span>
                    </div>
                    <div class="stat-card">
                        <span id="stat-downloads" class="stat-val">—</span>
                        <span class="stat-lbl">Total Downloads</span>
                    </div>
                    <div class="stat-card">
                        <span id="stat-ping" class="stat-val">—</span>
                        <span class="stat-lbl">Bot Ping</span>
                    </div>
                </div>

                <!-- Toolbar -------------------------------------------------------------- -->
                <div class="toolbar">
                    <input
                        id="search"
                        type="text"
                        class="input search-input"
                        placeholder="🔍  Search title, file, category…"
                        oninput="filterResources()"
                    />
                    <button
                        id="sync-btn"
                        onclick="triggerSync()"
                        class="btn btn-primary"
                    >
                        🔄 Sync
                    </button>
                </div>

                <!-- Table ---------------------------------------------------------------- -->
                <div class="table-wrap">
                    <table>
                        <thead>
                            <tr>
                                <th>Title</th>
                                <th>Category</th>
                                <th>File / Link</th>
                                <th>Downloads</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="tbody"></tbody>
                    </table>
                </div>
            </main>
        </div>

        <!-- ═══════════════════════════ EDIT MODAL ═══════════════════════════════════ -->
        <div
            id="edit-modal"
            class="modal-overlay hidden"
            onclick="handleOverlayClick(event)"
        >
            <div class="modal-card">
                <div class="modal-head">
                    <h2>Edit Resource</h2>
                    <button onclick="closeEdit()" class="btn-x">✕</button>
                </div>

                <form id="edit-form" onsubmit="saveEdit(event)">
                    <div class="field">
                        <label>Title</label>
                        <input
                            id="edit-title"
                            type="text"
                            class="input"
                            required
                        />
                    </div>

                    <div class="field">
                        <label>Description</label>
                        <textarea
                            id="edit-description"
                            class="input"
                            rows="4"
                            required
                        ></textarea>
                    </div>

                    <div class="field-row">
                        <div class="field">
                            <label
                                >Filename
                                <span class="muted"
                                    >(relative path)</span
                                ></label
                            >
                            <input
                                id="edit-filename"
                                type="text"
                                class="input"
                                placeholder="e.g. Mods/Pack.zip"
                            />
                        </div>
                        <div class="field">
                            <label
                                >Category
                                <span class="muted">(optional)</span></label
                            >
                            <input
                                id="edit-category"
                                type="text"
                                class="input"
                                placeholder="e.g. Mods"
                            />
                        </div>
                    </div>

                    <div class="field-row">
                        <div class="field">
                            <label
                                >Direct Download URL
                                <span class="muted">(optional)</span></label
                            >
                            <input
                                id="edit-direct-url"
                                type="text"
                                class="input"
                                placeholder="https://…"
                            />
                        </div>
                        <div class="field" style="flex: 0 0 160px">
                            <label
                                >Expiry
                                <span class="muted">(hours, 0 = ∞)</span></label
                            >
                            <input
                                id="edit-expiry"
                                type="number"
                                class="input"
                                min="0"
                                step="0.5"
                                placeholder="0"
                            />
                        </div>
                    </div>

                    <div class="modal-foot">
                        <button
                            type="button"
                            onclick="closeEdit()"
                            class="btn btn-ghost"
                        >
                            Cancel
                        </button>
                        <button
                            id="save-btn"
                            type="submit"
                            class="btn btn-primary"
                        >
                            Save Changes
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <!-- ═══════════════════════════ TOASTS ═══════════════════════════════════════ -->
        <div id="toasts"></div>

        <script src="app.js"></script>
    </body>
</html>
